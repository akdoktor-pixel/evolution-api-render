services:
  - type: web
    name: evolution-api
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: AUTHENTICATION_TYPE
        value: apikey
      - key: AUTHENTICATION_API_KEY
        generateValue: true
      - key: AUTHENTICATION_EXAMPLE_INSTANCE
        value: api
      - key: DATABASE_TYPE
        value: sqlite
      - key: DATABASE_SQLITE_PATH
        value: /tmp/database.sqlite
